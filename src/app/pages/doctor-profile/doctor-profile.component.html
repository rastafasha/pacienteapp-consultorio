<app-skeleton-loader *ngIf="cargando" [rows]="10" [columns]="1"></app-skeleton-loader>

<div *ngIf="!cargando">
    <section class="container animated fadeInUp " style=" padding-top: 30px; padding-bottom: 50px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
        <app-back-button title="Info Especialista"></app-back-button>
    </div>
        
        <div class="perfil">
            <div class="local_categoria_item" style="height: 240px;">
                <div class="logo_local">
                    <img [src]="avatar_doctor" alt="">
                </div>
                <div class="contenido" style="height: auto;
                transform: translateY(32px);">
                    <div class="info_local">
                        <h3>Dr.{{doctor.full_name}}</h3>
                        <p>Consultorio: {{doctor.address}}</p>
                        <p>Teléfono: {{doctor.mobile}}</p>
                        <p>Email: {{doctor.email}}</p>
                        <p>Precio Cita: {{doctor.precio_cita|currency}}</p>
                        <p >Especialidad: {{doctor.speciality.name}}</p>
                        <p >Horario: {{doctor.days_name}}</p>
                    </div>
                </div>
            </div>
        </div>

    </section>

</div>
