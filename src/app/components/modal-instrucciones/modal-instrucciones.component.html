<!-- Modal Dinámico de Instrucciones -->
<div class="modal fade" id="infoModal" tabindex="-1" aria-labelledby="infoModalLabel" aria-hidden="true" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content border-0 shadow">
      <!-- Header con color dinámico si lo deseas, aquí mantenemos el success -->
      <div class="modal-header bg-success text-white border-0">
        <h5 class="modal-title d-flex align-items-center" id="infoModalLabel">
          <i class="fa fa-info-circle me-2"></i> 
          <span>Guía de Sección: {{ sectionId | titlecase }}</span>
        </h5>
        <button type="button" class="btn-close btn-close-white" (click)="onClose()" aria-label="Close"></button>
      </div>

      <div class="modal-body py-4">
        <!-- El contenido inyectado desde el TS -->
        <div class="instrucciones-content" [innerHTML]="info"></div>
      </div>

      <div class="modal-footer border-0 bg-light d-flex justify-content-between">
        <!-- Botón para no volver a mostrar (Usa el ID único de sección internamente) -->
        <button type="button" class="btn btn-sm btn-outline-secondary" (click)="onNoShowMore()">
          No mostrar más en esta sección
        </button>
        
        <button type="button" class="btn btn-success px-4" (click)="onClose()">
          Entendido
        </button>
      </div>
    </div>
  </div>
</div>
